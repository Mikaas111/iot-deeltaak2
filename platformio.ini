[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

board_build.partitions = partitions/partitions.csv

build_flags =
    -I /home/mika/.platformio/packages/framework-espidf/components/bt/esp_ble_mesh/api/core/include
    -I /home/mika/.platformio/packages/framework-espidf/components/bt/esp_ble_mesh/api/models/include
    -I /home/mika/.platformio/packages/framework-espidf/components/bt/esp_ble_mesh/api
    -I /home/mika/.platformio/packages/framework-espidf/components/bt/include
    -I /home/mika/.platformio/packages/framework-espidf/components/esp_common/include
    -I /home/mika/.platformio/packages/framework-espidf/components/esp_hw_support/include
    -I /home/mika/.platformio/packages/framework-espidf/components/bt/esp_ble_mesh/api
    -I /home/mika/.platformio/packages/framework-espidf/examples/bluetooth/esp_ble_mesh/common_components/example_init/
; ^^ Bovenstaande is nodig voor Linux. Zou geen invloed moeten heben op het builden van de code voor iemand anders maar als dat fout gaat kun
; je dit eventueel herschrijven of verwijderen :)